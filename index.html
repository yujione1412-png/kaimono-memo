<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>いつもの買い物メモ</title>
<meta name="theme-color" content="#F3F4EF" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="買い物メモ" />
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" />
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png" />
<link rel="apple-touch-icon" href="apple-touch-icon.png" />
<link rel="manifest" href="manifest.webmanifest" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@500;700;800&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin></script>
<style>
:root{
  --bg:#F3F4EF; --card:#FFFFFF; --ink:#2B2A24; --sub:#8B887C;
  --green:#1F7A55; --green-dk:#155C40;
  --tag:#FFE05C; --tag-edge:#F2C500; --price:#D2442A;
  --line:#E4E2D8; --danger:#C0392B;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg)}
.app{min-height:100vh;background:var(--bg);color:var(--ink);
  font-family:'M PLUS Rounded 1c','Hiragino Sans','Noto Sans JP',sans-serif;
  max-width:520px;margin:0 auto;padding-bottom:96px}
button{font-family:inherit;cursor:pointer}
input,textarea{font-family:inherit;font-size:16px}

.header{padding:20px 16px 0;position:sticky;top:0;background:var(--bg);z-index:5}
.header__title{font-size:22px;font-weight:800;letter-spacing:.02em}
.header__title span{color:var(--green)}
.header__ver{font-size:11px;color:var(--sub);font-weight:700;margin-left:8px}
.tabs{display:flex;gap:8px;margin:14px 0 4px}
.tabs__btn{flex:1;padding:10px;border:2px solid var(--line);border-radius:999px;
  background:var(--card);font-weight:700;font-size:14px;color:var(--sub)}
.tabs__btn.is-on{border-color:var(--green);color:var(--green);background:#EAF4EE}
.tabs__count{margin-left:6px;background:var(--price);color:#fff;border-radius:999px;
  padding:1px 7px;font-size:12px}

.main{padding:12px 16px}
.loading{padding:40px;text-align:center;color:var(--sub)}
.alert{margin:8px 16px;padding:10px 12px;background:#FBEAE7;color:var(--danger);
  border-radius:10px;font-size:13px}
.search{width:100%;padding:10px 14px;border:2px solid var(--line);border-radius:12px;
  margin-bottom:10px;background:var(--card)}
.search:focus{outline:2px solid var(--green);outline-offset:1px}

.chips{display:flex;flex-wrap:wrap;gap:6px}
.chips--filter{margin-bottom:12px}
.chip{display:inline-flex;align-items:center;gap:4px;padding:6px 12px;border-radius:999px;
  border:1.5px solid var(--line);background:var(--card);font-size:13px;font-weight:700;color:var(--sub)}
.chip--on{border-color:var(--green);background:#EAF4EE;color:var(--green-dk)}
.chip--clear{border-style:dashed;color:var(--danger);border-color:#E7C2BB}
.chip__x{border:none;background:none;color:inherit;font-size:14px;padding:0 0 0 2px;line-height:1}
.minitag{font-size:10px;font-weight:700;color:var(--green);background:#EAF4EE;
  border-radius:999px;padding:1px 8px;margin-right:4px}
.card__tags{margin-top:4px}
.card__note{margin-top:4px;font-size:12px;color:#6F6C5F;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}
.memoarea{padding:10px 12px;border:2px solid var(--line);border-radius:10px;
  background:var(--card);width:100%;font-family:inherit;font-size:15px;
  line-height:1.6;resize:vertical}
.memoarea:focus{outline:none;border-color:var(--green)}

.welcome{background:var(--card);border-radius:16px;padding:28px 20px;text-align:center;
  border:2px dashed var(--line);margin-top:12px}
.welcome__tag{display:inline-block;background:var(--tag);border-bottom:4px solid var(--tag-edge);
  color:var(--price);font-weight:800;font-size:24px;padding:6px 16px;border-radius:4px;margin-bottom:16px}
.welcome h2{font-size:17px;line-height:1.6;margin-bottom:10px}
.welcome p{font-size:14px;color:var(--sub);line-height:1.7;margin-bottom:18px}

.cards{list-style:none;display:flex;flex-direction:column;gap:10px}
.card{background:var(--card);border-radius:14px;border:1px solid var(--line);overflow:hidden}
.card__body{display:flex;align-items:center;gap:12px;width:100%;padding:12px;
  background:none;border:none;text-align:left}
.thumb{width:64px;height:64px;border-radius:10px;background:#F0EEE5;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:26px;overflow:hidden}
.thumb img{width:100%;height:100%;object-fit:cover}
.thumb--sm{width:44px;height:44px;font-size:18px}
.card__info{flex:1;min-width:0}
.card__name{font-weight:700;font-size:15px;line-height:1.4;overflow:hidden;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.card__meta{display:flex;gap:8px;margin-top:4px;font-size:12px;color:var(--sub);flex-wrap:wrap}
.card__memo{width:100%;padding:8px;border:none;border-top:1px dashed var(--line);
  background:#FBFAF6;font-size:13px;font-weight:700;color:var(--green)}
.card__memo.is-on{background:#EAF4EE;color:var(--green-dk)}

.pricetag{background:var(--tag);border-bottom:3px solid var(--tag-edge);border-radius:4px;
  padding:6px 10px;text-align:right;flex-shrink:0}
.pricetag__main{color:var(--price);font-weight:800;font-size:18px;line-height:1;white-space:nowrap}
.pricetag__yen{font-size:12px;margin-right:1px}
.pricetag__incl{font-size:10px;margin-left:3px;color:#8a5a00;font-weight:700}
.pricetag__sub{font-size:10px;color:#7d6a1e;margin-top:3px;white-space:nowrap}
.pricetag__empty{font-size:11px;color:#8a7a30;padding:6px 2px}

.fab{position:fixed;right:20px;bottom:24px;width:58px;height:58px;border-radius:50%;
  background:var(--green);color:#fff;font-size:28px;border:none;
  box-shadow:0 6px 16px rgba(31,122,85,.4);z-index:6}
.fab:active{transform:scale(.95)}

.total{display:flex;justify-content:space-between;align-items:baseline;
  background:var(--card);border:1px solid var(--line);border-radius:12px;
  padding:12px 14px;margin-bottom:12px;font-size:13px;color:var(--sub)}
.total strong{color:var(--price);font-size:17px}
.total small{font-size:11px;color:var(--sub)}
.memolist{list-style:none;display:flex;flex-direction:column;gap:8px}
.memolist__item{display:flex;align-items:center;gap:10px;background:var(--card);
  border:1px solid var(--line);border-radius:12px;padding:10px 12px}
.memolist__item.is-done{opacity:.5}
.memolist__item.is-done .memolist__name{text-decoration:line-through}
.check{width:30px;height:30px;border-radius:8px;border:2px solid var(--green);
  background:var(--card);color:var(--green);font-weight:800;font-size:16px;flex-shrink:0}
.is-done .check{background:var(--green);color:#fff}
.memolist__info{flex:1;min-width:0}
.memolist__name{font-weight:700;font-size:14px}
.memolist__meta{font-size:12px;color:var(--sub);margin-top:2px}

.sheet{position:fixed;inset:0;background:var(--bg);z-index:20;overflow-y:auto;
  max-width:520px;margin:0 auto}
.sheet__bar{position:sticky;top:0;display:flex;justify-content:space-between;
  padding:12px 16px;background:var(--bg);border-bottom:1px solid var(--line);z-index:2}
.sheet__body{padding:16px;display:flex;flex-direction:column;gap:16px;padding-bottom:60px}

.photo-block{text-align:center}
.photo{width:160px;height:160px;border-radius:16px;border:2px dashed var(--line);
  background:var(--card);overflow:hidden;padding:0;display:inline-flex;
  align-items:center;justify-content:center;cursor:pointer;position:relative}
.photo img{width:100%;height:100%;object-fit:cover}
.photo__input{position:absolute;width:1px;height:1px;opacity:0;overflow:hidden;pointer-events:none}
.photo__placeholder{font-size:14px;color:var(--sub);line-height:1.8}
.photo__hint{font-size:12px;color:var(--sub);margin-top:6px}

.field{display:flex;flex-direction:column;gap:4px;flex:1;min-width:0}
.field__label{font-size:12px;font-weight:700;color:var(--sub)}
.field input{padding:10px 12px;border:2px solid var(--line);border-radius:10px;background:var(--card);width:100%}
.field input:focus{outline:none;border-color:var(--green)}
.field--big input{font-size:17px;font-weight:700}

.tagedit{display:flex;flex-direction:column;gap:8px;background:var(--card);
  border:1px solid var(--line);border-radius:12px;padding:12px}
.tagedit__none{font-size:12px;color:var(--sub)}
.tagedit__row{display:flex;gap:8px}
.tagedit__row input{flex:1;padding:9px 12px;border:2px solid var(--line);border-radius:10px}
.tagedit__row input:focus{outline:none;border-color:var(--green)}

.sec-head{display:flex;justify-content:space-between;align-items:center}
.sec-head h2{font-size:15px;font-weight:800}

.sortbar{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.sortbar__label{font-size:12px;color:var(--sub);font-weight:700}
.sortbar__btn{padding:6px 12px;border-radius:999px;border:1.5px solid var(--line);
  background:var(--card);font-size:13px;font-weight:700;color:var(--sub)}
.sortbar__btn.is-on{border-color:var(--green);background:#EAF4EE;color:var(--green-dk)}

.recform{background:var(--card);border:2px solid var(--green);border-radius:14px;
  padding:14px;display:flex;flex-direction:column;gap:12px}
.recform__row{display:flex;gap:10px}
.recform__hint{font-size:11px;color:var(--sub);line-height:1.6}
.recform__actions{display:flex;gap:10px;justify-content:flex-end}
.seg{display:flex;border:2px solid var(--line);border-radius:10px;overflow:hidden}
.seg__btn{flex:1;padding:9px 12px;border:none;background:var(--card);font-weight:700;color:var(--sub)}
.seg__btn.is-on{background:var(--green);color:#fff}

.reclist{list-style:none;display:flex;flex-direction:column;gap:8px}
.reclist__item{display:flex;align-items:center;gap:10px;background:var(--card);
  border:1px solid var(--line);border-radius:12px;padding:10px 12px}
.reclist__item.is-main{border-color:var(--tag-edge);background:#FFFBEA}
.star{border:none;background:none;font-size:20px;color:#D8D4C4;padding:2px;flex-shrink:0}
.star.is-on{color:var(--tag-edge)}
.reclist__info{flex:1;min-width:0}
.reclist__top{display:flex;gap:8px;align-items:center;font-size:12px;color:var(--sub);flex-wrap:wrap}
.badge{background:var(--tag);color:#8a5a00;font-size:10px;font-weight:800;
  padding:1px 7px;border-radius:999px}
.reclist__price{font-size:13px;margin-top:3px}
.reclist__price strong{color:var(--price);font-size:15px}
.reclist__excl{color:var(--sub);font-size:12px}
.reclist__ops{display:flex;flex-direction:column;gap:6px;align-items:flex-end}

.btn{padding:10px 18px;border-radius:999px;border:none;font-weight:800;font-size:14px}
.btn--primary{background:var(--green);color:#fff}
.btn--primary:disabled{background:#C6D6CC;cursor:default}
.btn--ghost{background:none;color:var(--green);border:2px solid transparent}
.btn--small{padding:6px 14px;font-size:13px;background:#EAF4EE;color:var(--green)}
.btn--small:disabled{opacity:.4;cursor:default}
.btn--wide{width:100%}
.btn--danger{background:none;border:2px solid var(--danger);color:var(--danger);margin-top:8px}
.linkbtn{background:none;border:none;color:var(--green);font-size:12px;font-weight:700;padding:2px}
.linkbtn--danger{color:var(--danger)}
.empty-note{font-size:13px;color:var(--sub);line-height:1.7;padding:8px 4px}

@media (prefers-reduced-motion: reduce){*{transition:none!important;animation:none!important}}

/* --- v7 追加: ヘッダーバー / 計算機ボタン --- */
.headerbar{display:flex;align-items:center;justify-content:space-between;gap:10px}
.calcbtn{display:inline-flex;align-items:center;gap:6px;padding:8px 12px;border-radius:999px;
  border:2px solid var(--green);background:#EAF4EE;color:var(--green-dk);font-weight:800;font-size:13px}
.calcbtn__icon{font-size:16px;line-height:1}
.calcbtn:active{transform:scale(.96)}

/* --- v7 追加: 単価表示 --- */
.pricecol{display:flex;flex-direction:column;align-items:flex-end;gap:3px;flex-shrink:0}
.unitprice{font-size:11px;font-weight:700;color:#9A7A18;white-space:nowrap}
.unitprice--detail{color:var(--green-dk);background:#EAF4EE;border-radius:8px;
  padding:6px 10px;font-size:12px;text-align:center}
.memolist__unit{color:#9A7A18;font-weight:700}

/* --- v7 追加: 単位セレクト --- */
.field--unit{max-width:110px;flex:0 0 auto}
.field select{padding:10px 12px;border:2px solid var(--line);border-radius:10px;
  background:var(--card);width:100%;font-family:inherit;font-size:16px;color:var(--ink)}
.field select:focus{outline:none;border-color:var(--green)}

/* --- v7 追加: 計算機画面 --- */
.sheet__title{font-weight:800;font-size:16px}
.calcintro{font-size:13px;color:var(--sub);line-height:1.7}
.calccard{background:var(--card);border:2px solid var(--line);border-radius:14px;padding:14px;
  display:flex;flex-direction:column;gap:12px}
.calccard.is-win{border-color:var(--green);background:#F1F8F4}
.calccard__head{display:flex;align-items:center;gap:8px}
.calccard__label{font-weight:800;font-size:14px}
.badge--win{background:var(--green);color:#fff}
.calcrow{display:flex;gap:10px}
.calcresult{font-size:14px;color:var(--sub);border-top:1px dashed var(--line);padding-top:10px}
.calcresult strong{color:var(--price);font-size:22px;margin-left:4px}
.calcresult__label{font-size:12px}
.calcresult__empty{font-size:12px}
.calcverdict{background:#EAF4EE;border-radius:12px;padding:14px;text-align:center;
  font-weight:800;color:var(--green-dk);font-size:15px}

</style>
</head>
