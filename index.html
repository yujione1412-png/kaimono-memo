<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>いつもの買い物メモ</title>
<meta name="theme-color" content="#F6F3E9" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="買い物メモ" />
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" />
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png" />
<link rel="apple-touch-icon" href="apple-touch-icon.png" />
<link rel="manifest" href="manifest.webmanifest" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700;900&family=M+PLUS+Rounded+1c:wght@500;700;800&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin></script>
<style>
:root{
  --bg:#F6F3E9; --card:#FFFFFF; --ink:#33302A; --sub:#8F8A7B;
  --green:#217A55; --green-dk:#14563C; --green-bg:#E9F3EC;
  --tag:#FFDF54; --tag-edge:#EFC400; --tag-ink:#8A5A00; --price:#D63B26;
  --line:#E7E2D3; --danger:#C0392B;
  --nav-h:64px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--bg)}
.app{min-height:100vh;background:var(--bg);color:var(--ink);
  font-family:'Zen Maru Gothic','M PLUS Rounded 1c','Hiragino Sans','Noto Sans JP',sans-serif;
  max-width:520px;margin:0 auto;
  padding-bottom:calc(var(--nav-h) + env(safe-area-inset-bottom) + 8px)}
button{font-family:inherit;cursor:pointer;color:inherit}
input,textarea,select{font-family:inherit;font-size:16px;color:var(--ink)}

/* ---------- ヘッダー ---------- */
.header{padding:18px 16px 8px;position:sticky;top:0;background:linear-gradient(var(--bg) 82%,transparent);z-index:5}
.header__title{font-size:21px;font-weight:900;letter-spacing:.03em}
.header__title span{color:var(--green)}
.header__ver{font-size:10px;color:var(--sub);font-weight:700;margin-left:8px;vertical-align:2px}

/* ---------- 共通 ---------- */
.main{padding:8px 16px 24px}
.loading{padding:48px;text-align:center;color:var(--sub)}
.muted{font-size:13px;color:var(--sub);line-height:1.7;padding:6px 2px}
.hint{font-size:12px;color:var(--sub);line-height:1.7}
.alertbar{margin:6px 16px;padding:10px 12px;background:#FBEAE7;color:var(--danger);border-radius:10px;font-size:13px}
.frow{display:flex;gap:10px;align-items:flex-end}
.frow--end{justify-content:flex-end}
.search{width:100%;padding:11px 14px;border:2px solid var(--line);border-radius:14px;margin-bottom:10px;background:var(--card)}
.search:focus{outline:none;border-color:var(--green)}

.toast{position:fixed;top:14px;left:50%;transform:translateX(-50%);z-index:60;
  background:var(--green-dk);color:#fff;font-weight:700;font-size:13px;
  padding:10px 18px;border-radius:999px;box-shadow:0 6px 18px rgba(0,0,0,.25);
  animation:toastin .18s ease-out}
@keyframes toastin{from{opacity:0;transform:translate(-50%,-8px)}to{opacity:1;transform:translate(-50%,0)}}

/* ---------- チップ ---------- */
.chips{display:flex;flex-wrap:wrap;gap:6px;align-items:center}
.chips--filter{margin:2px 0 12px}
.chip{display:inline-flex;align-items:center;gap:4px;padding:6px 12px;border-radius:999px;
  border:1.5px solid var(--line);background:var(--card);font-size:13px;font-weight:700;color:var(--sub)}
.chip--on{border-color:var(--green);background:var(--green-bg);color:var(--green-dk)}
.chip--clear{border-style:dashed;color:var(--danger);border-color:#E7C2BB}
.chip__x{border:none;background:none;font-size:14px;padding:0 0 0 2px;line-height:1}
.listtools{margin-bottom:8px}
.minitag{font-size:10px;font-weight:700;color:var(--green);background:var(--green-bg);border-radius:999px;padding:1px 8px;margin-right:4px}

/* ---------- ボタン ---------- */
.btn{padding:10px 18px;border-radius:999px;border:none;font-weight:900;font-size:14px}
.btn--primary{background:var(--green);color:#fff;box-shadow:0 3px 0 var(--green-dk)}
.btn--primary:active{transform:translateY(2px);box-shadow:0 1px 0 var(--green-dk)}
.btn--primary:disabled{background:#C6D6CC;box-shadow:none;cursor:default}
.btn--ghost{background:none;color:var(--green);border:2px solid transparent}
.btn--small{padding:6px 14px;font-size:13px;background:var(--green-bg);color:var(--green)}
.btn--small:disabled{opacity:.4;cursor:default}
.btn--wide{width:100%}
.btn--danger{background:none;border:2px solid var(--danger);color:var(--danger);margin-top:8px}
.linkbtn{background:none;border:none;color:var(--green);font-size:12px;font-weight:700;padding:2px}
.linkbtn--danger{color:var(--danger)}

/* ---------- ようこそ ---------- */
.welcome{background:var(--card);border-radius:18px;padding:30px 20px;text-align:center;
  border:2px dashed var(--line);margin-top:14px}
.welcome__tag{position:relative;display:inline-block;background:var(--tag);
  border-bottom:4px solid var(--tag-edge);color:var(--price);font-weight:900;font-size:24px;
  padding:8px 18px 8px 30px;border-radius:6px;margin-bottom:16px;
  clip-path:polygon(14px 0,100% 0,100% 100%,14px 100%,0 50%)}
.welcome h2{font-size:17px;line-height:1.7;margin-bottom:10px;font-weight:900}
.welcome p{font-size:13.5px;color:var(--sub);line-height:1.8;margin-bottom:18px}

/* ---------- アイテムカード ---------- */
.cards{list-style:none;display:flex;flex-direction:column;gap:10px}
.card{background:var(--card);border-radius:16px;border:1px solid var(--line);overflow:hidden;
  box-shadow:0 1px 3px rgba(80,70,40,.06)}
.card__body{display:flex;align-items:center;gap:12px;width:100%;padding:12px;background:none;border:none;text-align:left}
.thumb{width:68px;height:68px;border-radius:12px;background:#F1EDDF;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:26px;overflow:hidden}
.thumb img{width:100%;height:100%;object-fit:cover}
.thumb--sm{width:44px;height:44px;font-size:18px;border-radius:9px}
.card__info{flex:1;min-width:0}
.card__name{font-weight:900;font-size:15px;line-height:1.45;overflow:hidden;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.card__meta{display:flex;gap:8px;margin-top:3px;font-size:11.5px;color:var(--sub);flex-wrap:wrap}
.card__note{margin-top:3px;font-size:12px;color:#6F6C5F;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}
.card__tags{margin-top:4px}
.card__cart{width:100%;padding:8px;border:none;border-top:1px dashed var(--line);
  background:#FBF9F1;font-size:12.5px;font-weight:900;color:var(--green)}
.card__cart.is-on{background:var(--green-bg);color:var(--green-dk)}

/* ---------- 棚札 ---------- */
.shelfcol{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0}
.shelftag{position:relative;background:var(--tag);border-bottom:3px solid var(--tag-edge);
  border-radius:5px;padding:7px 10px 6px 22px;text-align:right;
  clip-path:polygon(13px 0,100% 0,100% 100%,13px 100%,0 50%)}
.shelftag__hole{position:absolute;left:11px;top:50%;transform:translate(-50%,-50%);
  width:7px;height:7px;border-radius:50%;background:var(--bg);
  box-shadow:inset 0 0 0 2px var(--tag-edge)}
.shelftag__main{color:var(--price);font-weight:900;font-size:19px;line-height:1;white-space:nowrap}
.shelftag__yen{font-size:12px;margin-right:1px}
.shelftag__sub{font-size:9.5px;color:var(--tag-ink);margin-top:3px;white-space:nowrap;font-weight:700}
.shelftag__empty{font-size:11px;color:var(--tag-ink);padding:4px 0}
.unitprice{font-size:11px;font-weight:900;color:#9A7A18;white-space:nowrap}

/* ---------- FAB ---------- */
.fab{position:fixed;right:18px;bottom:calc(var(--nav-h) + env(safe-area-inset-bottom) + 16px);
  width:58px;height:58px;border-radius:50%;background:var(--green);color:#fff;font-size:28px;border:none;
  box-shadow:0 6px 16px rgba(33,122,85,.4);z-index:6}
.fab:active{transform:scale(.94)}

/* ---------- 下部タブバー ---------- */
.tabbar{position:fixed;left:0;right:0;bottom:0;z-index:30;display:flex;justify-content:center;
  background:var(--card);border-top:1px solid var(--line);
  padding-bottom:env(safe-area-inset-bottom);box-shadow:0 -4px 16px rgba(80,70,40,.08)}
.tabbar__btn{flex:1;max-width:173px;height:var(--nav-h);border:none;background:none;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;
  font-size:11px;font-weight:900;color:var(--sub);position:relative}
.tabbar__btn.is-on{color:var(--green-dk)}
.tabbar__btn.is-on::after{content:"";position:absolute;top:0;left:24%;right:24%;height:3px;
  background:var(--green);border-radius:0 0 4px 4px}
.tabbar__icon{font-size:20px;line-height:1}
.tabbar__count{position:absolute;top:8px;right:calc(50% - 26px);
  background:var(--price);color:#fff;border-radius:999px;padding:0 6px;font-size:10px;min-width:16px;height:16px;line-height:16px}

/* ---------- 買い物メモ ---------- */
.total{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:12px 14px;margin-bottom:12px}
.total__row{display:flex;justify-content:space-between;align-items:baseline;font-size:13px;color:var(--sub)}
.total__row strong{color:var(--price);font-size:17px;font-weight:900}
.total__row small{font-size:10px;color:var(--sub)}
.total__row--sub{margin-top:6px;padding-top:6px;border-top:1px dashed var(--line);font-size:12px}
.memolist{list-style:none;display:flex;flex-direction:column;gap:8px;margin-bottom:14px}
.memorow{display:flex;align-items:center;gap:10px;background:var(--card);
  border:1px solid var(--line);border-radius:14px;padding:10px 12px}
.memorow.is-done{opacity:.45}
.memorow.is-done .memorow__name{text-decoration:line-through}
.check{width:32px;height:32px;border-radius:10px;border:2px solid var(--green);
  background:var(--card);color:var(--green);font-weight:900;font-size:16px;flex-shrink:0}
.is-done .check{background:var(--green);color:#fff}
.memorow__info{flex:1;min-width:0}
.memorow__name{font-weight:900;font-size:14px}
.memorow__meta{font-size:11.5px;color:var(--sub);margin-top:2px}
.memorow__unit{color:#9A7A18;font-weight:700}

/* ---------- 詳細シート ---------- */
.sheet{position:fixed;inset:0;background:var(--bg);z-index:40;overflow-y:auto;max-width:520px;margin:0 auto}
.sheet__bar{position:sticky;top:0;display:flex;justify-content:space-between;align-items:center;
  padding:12px 16px;background:var(--bg);border-bottom:1px solid var(--line);z-index:2}
.sheet__title{font-weight:900;font-size:15px}
.sheet__body{padding:16px;display:flex;flex-direction:column;gap:16px;padding-bottom:80px}

.idhead{display:flex;gap:14px;align-items:flex-start}
.photo{width:104px;height:104px;border-radius:14px;border:2px dashed var(--line);flex-shrink:0;
  background:var(--card);overflow:hidden;display:inline-flex;align-items:center;justify-content:center;
  cursor:pointer;position:relative}
.photo img{width:100%;height:100%;object-fit:cover}
.photo__input{position:absolute;width:1px;height:1px;opacity:0;overflow:hidden;pointer-events:none}
.photo__ph{font-size:12px;color:var(--sub);line-height:1.7;text-align:center}
.idhead__fields{flex:1;display:flex;flex-direction:column;gap:10px;min-width:0}

.field{display:flex;flex-direction:column;gap:4px;flex:1;min-width:0}
.field__label{font-size:11.5px;font-weight:900;color:var(--sub)}
.field input{padding:10px 12px;border:2px solid var(--line);border-radius:10px;background:var(--card);width:100%}
.field input:focus{outline:none;border-color:var(--green)}
.field--big input{font-size:16px;font-weight:900}
.field--unit{max-width:104px;flex:0 0 auto}
.field--rate{max-width:120px;flex:0 0 auto}
.field select{padding:10px 10px;border:2px solid var(--line);border-radius:10px;background:var(--card);width:100%}
.field select:focus{outline:none;border-color:var(--green)}

.unitbanner{background:var(--green-bg);color:var(--green-dk);border-radius:10px;
  padding:8px 12px;font-size:12.5px;text-align:center;font-weight:700}
.unitbanner b{font-size:14px}

.tagedit{display:flex;flex-direction:column;gap:8px;background:var(--card);
  border:1px solid var(--line);border-radius:12px;padding:12px}
.tagedit input{flex:1;padding:9px 12px;border:2px solid var(--line);border-radius:10px}
.tagedit input:focus{outline:none;border-color:var(--green)}
.memoarea{padding:10px 12px;border:2px solid var(--line);border-radius:10px;background:var(--card);
  width:100%;font-size:15px;line-height:1.6;resize:vertical}
.memoarea:focus{outline:none;border-color:var(--green)}

.sechead{display:flex;justify-content:space-between;align-items:center}
.sechead h2{font-size:15px;font-weight:900}
.sortbar{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.sortbar__label{font-size:12px;color:var(--sub);font-weight:900}

.recform{background:var(--card);border:2px solid var(--green);border-radius:14px;padding:14px;
  display:flex;flex-direction:column;gap:12px}
.seg{display:flex;border:2px solid var(--line);border-radius:10px;overflow:hidden}
.seg__btn{flex:1;padding:9px 10px;border:none;background:var(--card);font-weight:900;color:var(--sub)}
.seg__btn.is-on{background:var(--green);color:#fff}

.reclist{list-style:none;display:flex;flex-direction:column;gap:8px}
.rec{display:flex;align-items:center;gap:10px;background:var(--card);
  border:1px solid var(--line);border-radius:12px;padding:10px 12px}
.rec.is-main{border-color:var(--tag-edge);background:#FFFBE8}
.star{border:none;background:none;font-size:20px;color:#DBD6C2;padding:2px;flex-shrink:0}
.star.is-on{color:var(--tag-edge)}
.rec__info{flex:1;min-width:0}
.rec__top{display:flex;gap:8px;align-items:center;font-size:11.5px;color:var(--sub);flex-wrap:wrap}
.badge{background:var(--tag);color:var(--tag-ink);font-size:10px;font-weight:900;padding:1px 8px;border-radius:999px}
.badge--best{background:var(--green);color:#fff}
.badge--win{background:var(--green);color:#fff}
.rec__price{font-size:13px;margin-top:3px}
.rec__price strong{color:var(--price);font-size:15px;font-weight:900}
.rec__excl{color:var(--sub);font-size:12px}
.rec__ops{display:flex;flex-direction:column;gap:6px;align-items:flex-end}

/* ---------- 電卓 ---------- */
.calccard{background:var(--card);border:2px solid var(--line);border-radius:16px;padding:14px;
  display:flex;flex-direction:column;gap:12px;margin-top:10px}
.calccard.is-win{border-color:var(--green);background:#F3FAF5}
.calccard__head{display:flex;align-items:center;gap:8px}
.calccard__label{font-weight:900;font-size:14px}
.calcresult{font-size:13px;color:var(--sub);border-top:1px dashed var(--line);padding-top:10px}
.calcresult strong{color:var(--price);font-size:22px;margin-left:4px;font-weight:900}
.verdict{background:var(--green-bg);border-radius:12px;padding:14px;text-align:center;
  font-weight:900;color:var(--green-dk);font-size:15px;margin-top:10px}
.calcinput{width:100%;text-align:right;padding:10px 12px;border:2px solid var(--line);
  border-radius:10px;background:var(--card);font-size:18px;font-weight:900;min-height:46px}
.calcinput.is-active{border-color:var(--green);box-shadow:0 0 0 3px rgba(33,122,85,.15)}
.calcinput__ph{color:#C4C0B0;font-weight:500}
.keypad-spacer{height:290px}
.keypad-wrap{position:fixed;left:0;right:0;bottom:calc(var(--nav-h) + env(safe-area-inset-bottom));
  z-index:35;display:flex;justify-content:center}
.keypad{width:100%;max-width:520px;background:#ECE8DA;border-top:1px solid var(--line);
  padding:10px;display:flex;gap:8px;box-shadow:0 -6px 20px rgba(0,0,0,.10)}
.keypad__grid{flex:3;display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.keypad__side{flex:1;display:flex;flex-direction:column;gap:8px}
.keypad__btn{border:none;border-radius:12px;background:#fff;font-size:20px;font-weight:900;
  padding:14px 0;min-height:50px;box-shadow:0 2px 0 #D8D3C1}
.keypad__btn:active{transform:translateY(1px);box-shadow:0 1px 0 #D8D3C1}
.keypad__btn.op{background:#FBEAD1;color:#B26A00}
.keypad__btn.fn{background:#E0DCCB;color:#6B6858;font-size:17px}
.keypad__btn.eq{background:var(--green);color:#fff;flex:1;box-shadow:0 2px 0 var(--green-dk)}
.keypad__btn.done{background:#fff;color:var(--green);border:2px solid var(--green);flex:1;font-size:14px}
.keypad__side .keypad__btn{flex:1}

@media (prefers-reduced-motion: reduce){*{transition:none!important;animation:none!important}}

/* --- v10 追加: 写真の撮影/選択メニュー --- */
.pmodal{position:fixed;inset:0;background:rgba(40,36,24,.45);z-index:55;
  display:flex;align-items:flex-end;justify-content:center}
.pmodal__box{width:100%;max-width:520px;background:var(--card);
  border-radius:20px 20px 0 0;padding:14px 14px calc(14px + env(safe-area-inset-bottom));
  display:flex;flex-direction:column;gap:10px;animation:sheetup .18s ease-out}
@keyframes sheetup{from{transform:translateY(24px);opacity:.6}to{transform:translateY(0);opacity:1}}
.pmodal__btn{display:block;width:100%;text-align:center;padding:15px;border:none;
  background:#F4F1E6;border-radius:14px;font-weight:900;font-size:15px;cursor:pointer;position:relative}
.pmodal__btn:active{background:#EAE6D6}
.pmodal__cancel{background:none;color:var(--sub);font-size:14px;padding:10px}

/* --- v10 追加: 詳細シート内のキーパッド --- */
.keypad-wrap{z-index:50}
.keypad-wrap--flush{bottom:0}
.keypad-wrap--flush .keypad{padding-bottom:calc(10px + env(safe-area-inset-bottom))}

</style>
</head>
<body>
<div id="root"></div>
<script>
window.storage = {
  async get(key){ const v = localStorage.getItem(key); if(v===null) throw new Error("key not found: "+key); return {key, value:v}; },
  async set(key, value){ localStorage.setItem(key, value); return {key, value}; },
  async delete(key){ localStorage.removeItem(key); return {key, deleted:true}; },
  async list(prefix=""){ const keys=[]; for(let i=0;i<localStorage.length;i++){ const k=localStorage.key(i); if(k&&k.startsWith(prefix)) keys.push(k);} return {keys, prefix}; },
};
</script>
<script>
window.addEventListener("error", function(e){
  var r = document.getElementById("root");
  if (r && !r.hasChildNodes()) {
    r.innerHTML = "<div style='padding:24px;font-family:sans-serif;color:#C0392B;line-height:1.7'><b>読み込みエラー</b><br>" + (e.message || "不明なエラー") + "<br><small>電波の良い場所で再読み込みしてみてください。</small></div>";
  }
});
</script>
<script>
const {
  useState,
  useEffect,
  useMemo,
  useRef,
  Fragment
} = React;

/* ============================================================
   いつもの買い物メモ v9 — 再設計版
   下部タブ / 棚札デザイン / 最安バッジ / 一覧ソート / 電卓タブ
   データ形式は旧バージョンと互換(localStorage "item:*")
   ============================================================ */

const UNITS = ["g", "kg", "ml", "L", "個", "枚", "ロール", "回分"];

// ---------- ユーティリティ ----------
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
const today = () => new Date().toISOString().slice(0, 10);
const yen = n => n === "" || n == null || isNaN(n) ? "—" : "¥" + Number(n).toLocaleString();
const fmtDate = d => {
  if (!d) return "—";
  const [y, m, day] = d.split("-");
  return `${y}/${Number(m)}/${Number(day)}`;
};
const fmtUnitPrice = v => {
  if (v == null || isNaN(v)) return null;
  if (v >= 100) return Math.round(v).toLocaleString();
  return (Math.round(v * 100) / 100).toString();
};
const mainRecord = item => {
  if (!item.records || item.records.length === 0) return null;
  return item.records.find(r => r.isMain) || [...item.records].sort((a, b) => (b.date || "").localeCompare(a.date || ""))[0];
};
const latestDate = item => {
  if (!item.records || item.records.length === 0) return "";
  return item.records.reduce((m, r) => (r.date || "") > m ? r.date : m, "");
};
const cheapestId = records => {
  if (!records || records.length < 2) return null;
  return records.reduce((min, r) => Number(r.priceIncl) < Number(min.priceIncl) ? r : min, records[0]).id;
};
const unitPriceOf = item => {
  const main = mainRecord(item);
  const vol = evalExpr(item.volume); // 容量は「3×50」のような式でもOK(150として計算)
  if (!main || vol == null || vol <= 0) return null;
